version: "3.1"
services:
  minio:
    image: minio/minio
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /data/bronze
        minio server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000" # API port
      - "9001:9001" # Console port (Web UI)
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  minio_data:
