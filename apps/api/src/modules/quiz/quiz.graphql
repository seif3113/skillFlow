# A quiz for a node. Questions are returned WITHOUT the correct answer — the
# answer never leaves the server until an attempt is graded.
type Quiz {
  id: Int!
  nodeId: Int!
  title: String!
  questions: [QuizQuestion!]!
}

type QuizQuestion {
  id: Int!
  question: String!
  choices: JSON!
}

# Per-question outcome, revealed only in the graded result.
type QuizQuestionResult {
  questionId: Int!
  correct: Boolean!
  correctAnswer: Int!
  explanation: String
}

type QuizResult {
  score: Int!
  passed: Boolean!
  passThreshold: Int!
  results: [QuizQuestionResult!]!
  # Whether passing this attempt completed the node (hard gate).
  nodeCompleted: Boolean!
}

extend type Query {
  # The node's quiz, or null if one hasn't been generated yet.
  nodeQuiz(nodeId: Int!): Quiz
}

extend type Mutation {
  # AI-generate the quiz for a node (idempotent: returns the existing one).
  generateNodeQuiz(nodeId: Int!): Quiz!
  # Grade an attempt server-side; a passing attempt completes the node.
  submitQuizAttempt(nodeId: Int!, answers: [Int!]!): QuizResult!
}
