type Roadmap {
  id: Int!
  userId: Int!
  learningProfileId: Int
  title: String!
  description: String
  isPublished: Boolean!
  createdAt: DateTime!
  updatedAt: DateTime!
  nodes: [Node!]
  edges: [NodeEdge!]
  learningProfile: RoadmapLearningProfile
  editLogs: [RoadmapEditLog!]
}

type PublicRoadmap {
  id: Int!
  userName: String!
  title: String!
  description: String
  isPublished: Boolean!
  createdAt: DateTime!
  updatedAt: DateTime!
  nodes: [Node!]
}

type RoadmapLearningProfile {
  id: Int!
  userId: Int!
  goal: String
  level: String
  background: String
  timeAvailability: String
  preferences: JSON!
  createdAt: DateTime!
}

type RoadmapEditLog {
  id: Int!
  roadmapId: Int!
  sender: String!
  intent: String!
  message: JSON!
  accept: Boolean
  sentAt: DateTime!
}

type DeleteRoadmapResult {
  success: Boolean!
  message: String!
}

input CreateRoadmapInput {
  userId: Int!
  title: String!
  description: String
  learningProfileId: Int
  isPublished: Boolean
}

input UpdateRoadmapInput {
  id: Int!
  userId: Int
  title: String
  description: String
  learningProfileId: Int
  isPublished: Boolean
}

type RoadmapCustomizationQuestion {
  question: String!
  choices: [String!]!
}

type RoadmapStreamEvent {
  event: String!
  node: Node
  edges: [NodeEdge!]
  message: String
}

extend type Query {
  roadmaps: [Roadmap!]!
  roadmap(id: Int!): Roadmap
  roadmapsByUser(userId: Int!): [Roadmap!]!
  roadmapsByLearningProfile(learningProfileId: Int!): [Roadmap!]!
  roadmapLearningProfiles(userId: Int!): [RoadmapLearningProfile!]!
  publicRoadmaps: [PublicRoadmap!]!
  publicRoadmap(id: Int!): PublicRoadmap
  roadmapCustomizationQuestions(
    message: String!
  ): [RoadmapCustomizationQuestion!]!
}

type Subscription {
  roadmapGenerationStream(roadmapId: Int!): RoadmapStreamEvent!
}

extend type Mutation {
  createRoadmap(input: CreateRoadmapInput!): Roadmap!
  updateRoadmap(input: UpdateRoadmapInput!): Roadmap!
  updateRoadmapAi(id: Int!, message: String!): [Node!]!
  deleteRoadmap(id: Int!): DeleteRoadmapResult!
  publishRoadmap(id: Int!): Roadmap!
  forkRoadmap(id: Int!, userId: Int!): Roadmap!
  createRoadmapLearningProfile(
    userId: Int!
    goal: String
    level: String
    background: String
    timeAvailability: String
    preferences: JSON
  ): RoadmapLearningProfile!
  generateRoadmapStream(
    roadmapId: Int!
    topic: String!
    customizationAnswers: [String!]
  ): Boolean!
}
