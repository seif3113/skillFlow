type Node {
  id: Int
  roadmapId: Int!
  title: String!
  description: String
  tags: JSON
  resources: JSON
  isCompleted: Boolean!
  intent: String
  createdAt: DateTime!
  updatedAt: DateTime!
  chats: [NodeExplanationChat!]
}

type NodeExplanationChat {
  id: Int!
  nodeId: Int!
  userId: Int!
  sender: String!
  message: JSON!
  sentAt: DateTime!
}

type DeleteNodeResult {
  success: Boolean!
  message: String!
}

# A prerequisite edge in a roadmap's DAG: source is a prerequisite of target.
type NodeEdge {
  id: Int!
  roadmapId: Int!
  sourceNodeId: Int!
  targetNodeId: Int!
}

input CreateNodeInput {
  roadmapId: Int!
  title: String!
  description: String
  tags: JSON
  resources: JSON
  isCompleted: Boolean
}

input UpdateNodeInput {
  id: Int!
  roadmapId: Int
  title: String
  description: String
  tags: JSON
  resources: JSON
  isCompleted: Boolean
}

extend type Query {
  node(id: Int!): Node
  nodesByRoadmap(roadmapId: Int!): [Node!]!
  nodeChats(nodeId: Int!, userId: Int!): [NodeExplanationChat!]!
  searchNodeResources(topic: String!, limit: Int, type: String): [JSON]!
}

extend type Mutation {
  createNode(input: CreateNodeInput!): Node!
  updateNode(input: UpdateNodeInput!): Node!
  deleteNode(id: Int!): DeleteNodeResult!
  sendNodeChatMessage(
    nodeId: Int!
    userId: Int!
    sender: String!
    message: JSON!
  ): NodeExplanationChat!
  createNodeEdge(
    roadmapId: Int!
    sourceNodeId: Int!
    targetNodeId: Int!
  ): NodeEdge!
  deleteNodeEdge(id: Int!): DeleteNodeResult!
}
